name: Training PR Timeout Close

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  close-timeout-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/workflows/timeout-close-prs.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN || secrets.GITHUB_TOKEN }}
