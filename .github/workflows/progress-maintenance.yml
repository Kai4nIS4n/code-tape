name: Training Progress Maintenance

on:
  pull_request_target:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: training-progress
  cancel-in-progress: false

jobs:
  update-progress:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.TRAINING_BOT_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/workflows/apply-merge-score.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Commit progress
        run: |
          if ! git diff --quiet -- docs/progress.json docs/progress.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/progress.json docs/progress.md
            git commit -m "chore: update training progress"
            git push
          fi
